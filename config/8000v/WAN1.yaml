---
# WAN1.yaml - Cross-site WAN/ISN router (Catalyst 8000V, IOS-XE)
# Cross-site infrastructure carries no site prefix (like ER).
name: WAN1
role: WAN Router
sid: 9101
mgmt_bridge: BR_ND_DATA_12
mgmt_ip: 192.168.12.112/24
mgmt_gw: 192.168.12.1
neighbors:
  - S1_BG1
  - S2_BG1
isl_bridges:
  - BR_ISN_WAN_S1_1
  - BR_ISN_WAN_S2_1
